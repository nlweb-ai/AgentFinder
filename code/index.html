  <style>
    /* Reset and base styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #7c4a3a 0%, #a0604c 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #333;
    }

    /* Container */
    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 30px;
      padding: 30px;
      background: rgba(255, 255, 255, 0.98);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .header h1 {
      font-size: 2rem;
      color: #333;
      margin-bottom: 10px;
    }

    .header p {
      color: #666;
      font-size: 1.1rem;
    }

    /* Search Section */
    .search-section {
      background: rgba(255, 255, 255, 0.98);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .search-wrapper {
      display: flex;
      gap: 12px;
    }

    .search-input {
      flex: 1;
      padding: 14px 20px;
      font-size: 16px;
      border: 2px solid #e1e8ed;
      border-radius: 10px;
      outline: none;
      transition: all 0.3s;
    }

    .search-input:focus {
      border-color: #7c4a3a;
      box-shadow: 0 0 0 3px rgba(124, 74, 58, 0.1);
    }

    .search-button {
      padding: 14px 32px;
      background: linear-gradient(135deg, #7c4a3a 0%, #a0604c 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      min-width: 120px;
    }

    .search-button:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(124, 74, 58, 0.3);
    }

    .search-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Results Section */
    .results-section {
      background: rgba(255, 255, 255, 0.98);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      flex: 1;
      overflow-y: auto;
      min-height: 400px;
    }

    /* Loading State */
    .loading {
      text-align: center;
      padding: 60px 20px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #7c4a3a;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      color: #666;
      font-size: 1.1rem;
    }

    /* Results */
    .result-item {
      background: white;
      border: 1px solid #e1e8ed;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      transition: all 0.3s;
    }

    .result-item:hover {
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
      transform: translateY(-2px);
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .result-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: #333;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .result-title:hover {
      color: #7c4a3a;
    }

    .result-score {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      background: linear-gradient(135deg, #7c4a3a 0%, #a0604c 100%);
      color: white;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .result-description {
      color: #666;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .result-url {
      color: #999;
      font-size: 0.9rem;
      text-decoration: none;
    }

    .result-url:hover {
      color: #7c4a3a;
    }

    /* Sample Queries */
    .sample-queries {
      padding: 40px;
    }

    .sample-queries-header {
      color: #999;
      margin-bottom: 24px;
      font-size: 1rem;
    }

    .sample-query {
      padding: 12px 0;
      color: #666;
      cursor: pointer;
      transition: all 0.2s;
      border-bottom: 1px solid #f0f0f0;
    }

    .sample-query:hover {
      color: #7c4a3a;
      padding-left: 10px;
      background: linear-gradient(90deg, rgba(124, 74, 58, 0.05) 0%, transparent 100%);
    }

    /* Error State */
    .error {
      background: #fee;
      border: 1px solid #fcc;
      border-radius: 8px;
      padding: 16px;
      color: #c00;
      margin: 20px 0;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .empty-state svg {
      width: 100px;
      height: 100px;
      margin-bottom: 20px;
      opacity: 0.3;
    }

    /* Rank Badge */
    .rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      background: #f0f0f0;
      border-radius: 50%;
      font-size: 0.85rem;
      font-weight: 600;
      color: #666;
      margin-right: 8px;
    }

    .rank-badge.top-3 {
      background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
      color: #333;
    }
  </style>

      "Wood stains in oil and water-based formulas",
      "Chisels in various widths for mortise and tenon joints",
      "Hand planes for smoothing and shaping wood surfaces",
      "Marking gauges for precise measurements and layouts",
      "Japanese water stones for sharpening edge tools",
      "Dust collection systems for workshop cleanliness",
      "Leather working stamps for tooling decorative patterns",
      "Edge bevelers for finishing leather goods professionally",
      "Stitching chisels in various prong configurations",
      "Waxed thread in different weights and colors",
      "Leather dyes and finishes in authentic tones",
      "Rivet setters and snaps for functional closures",
      "Skiving knives for thinning leather edges",
      "Burnishing tools for polishing cut leather edges",
      "Leather cement and contact adhesives for bonding",
      "Belt blanks in various widths and thicknesses",
      "Embroidery hoops in multiple sizes for hand stitching",
      "DMC floss in complete color ranges for cross stitch",
      "Sashiko thread and needles for Japanese mending",
      "Crewel wool for dimensional embroidery work",
      "Pressure canners for preserving low-acid foods safely",
      "Aida cloth and evenweave fabric for counted thread",
      "Needle threaders for fine embroidery needles",
      "Pectin for making jams and jellies that set properly",
      "Jar lifters for safely removing hot jars from water",
      "Pickle crisp for maintaining vegetable texture",
      "Hemp shower curtains that resist mildew naturally",
      "Aquaponics systems combining fish and plant growth",
      "Wooden bath mats with slats for drainage",
      "Worm composting bins for kitchen scrap recycling",
      "Pruning shears with bypass cutting action",
      "Soil testing kits for pH and nutrient analysis",
      "Diatomaceous earth for natural insect barriers",
      "Beneficial nematodes for controlling soil pests",
      "Companion planting guides for natural pest management",
      "Cold frames and row covers extending growing seasons",
      "Rain gauges for monitoring garden irrigation needs",
      "Soil amendments including compost and worm castings"
    ];

    class WHOInterface {
      constructor() {
        this.searchInput = document.getElementById('searchInput');
        this.searchButton = document.getElementById('searchButton');
        this.resultsContainer = document.getElementById('results');
        this.isSearching = false;

        this.init();
      }

      init() {
        // Show sample queries
        this.showSampleQueries();

        // Event listeners
        this.searchButton.addEventListener('click', () => this.performSearch());
        this.searchInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            this.performSearch();
          }
        });
      }

      showSampleQueries() {
        const sampleContainer = document.getElementById('sampleQueries');

        // Randomly select 25 queries from the full list of 390+
        const selected = this.shuffleArray([...SAMPLE_QUERIES]).slice(0, 25);

        selected.forEach(query => {
          const queryDiv = document.createElement('div');
          queryDiv.className = 'sample-query';
          queryDiv.textContent = query.charAt(0).toUpperCase() + query.slice(1);
          queryDiv.addEventListener('click', () => {
            this.searchInput.value = query;
            this.performSearch();
          });
          sampleContainer.appendChild(queryDiv);
        });
      }

      shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      }

      async performSearch() {
        const query = this.searchInput.value.trim();
        if (!query || this.isSearching) return;

        this.isSearching = true;
        this.searchButton.disabled = true;
        this.searchButton.textContent = 'Searching...';

        // Show loading state
        this.resultsContainer.innerHTML = `
          <div class="loading">
            <div class="spinner"></div>
            <div class="loading-text">Finding relevant sites for your query...</div>
          </div>
        `;

        try {
          const response = await fetch('/who', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ query })
          });

          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }

          const data = await response.json();

          // Parse MCP-style response
          let results = [];
          if (data.content && Array.isArray(data.content) && data.content.length > 0) {
            const content = data.content[0];
            if (content.type === 'text' && content.text) {
              try {
                results = JSON.parse(content.text);
              } catch (e) {
                console.error('Failed to parse results:', e);
                results = [];
              }
            }
          }

          this.displayResults(results, query);

        } catch (error) {
          console.error('Search error:', error);
          this.showError(error.message);
        } finally {
          this.isSearching = false;
          this.searchButton.disabled = false;
          this.searchButton.textContent = 'Search';
        }
      }

      displayResults(results, query) {
        if (!results || results.length === 0) {
          this.resultsContainer.innerHTML = `
            <div class="empty-state">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <path d="m21 21-4.35-4.35"/>
              </svg>
              <h3>No results found</h3>
              <p>No relevant sites were found for "${this.escapeHtml(query)}"</p>
            </div>
          `;
          return;
        }

        // Sort by score (highest first)
        results.sort((a, b) => (b.score || 0) - (a.score || 0));

        let html = `
          <div style="margin-bottom: 20px; color: #666;">
            Found ${results.length} relevant site${results.length !== 1 ? 's' : ''} for: <strong>"${this.escapeHtml(query)}"</strong>
          </div>
        `;

        results.forEach((result, index) => {
          const rank = index + 1;
          const isTop3 = rank <= 3;

          html += `
            <div class="result-item">
              <div class="result-header">
                <a href="${this.escapeHtml(result.url)}" target="_blank" class="result-title">
                  <span class="rank-badge ${isTop3 ? 'top-3' : ''}">${rank}</span>
                  ${this.escapeHtml(result.name || 'Unknown Site')}
                </a>
                <span class="result-score">${result.score || 0}</span>
              </div>
              ${result.description ? `
                <div class="result-description">
                  ${this.escapeHtml(result.description)}
                </div>
              ` : ''}
              <a href="${this.escapeHtml(result.url)}" target="_blank" class="result-url">
                ${this.escapeHtml(this.truncateUrl(result.url))}
              </a>
            </div>
          `;
        });

        this.resultsContainer.innerHTML = html;
      }

      showError(message) {
        this.resultsContainer.innerHTML = `
          <div class="error">
            <strong>Error:</strong> ${this.escapeHtml(message)}
          </div>
        `;
      }

      truncateUrl(url) {
        if (url.length > 60) {
          return url.substring(0, 60) + '...';
        }
        return url;
      }

      escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }
    }

    // Initialize when page loads
    document.addEventListener('DOMContentLoaded', () => {
      new WHOInterface();
    });
  </script>
</body>
