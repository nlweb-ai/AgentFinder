<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WHO Handler - Site Finder</title>
  <style>
    /* Reset and base styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #7c4a3a 0%, #a0604c 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #333;
    }

    /* Container */
    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 30px;
      padding: 30px;
      background: rgba(255, 255, 255, 0.98);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .header h1 {
      font-size: 2rem;
      color: #333;
      margin-bottom: 10px;
    }

    .header p {
      color: #666;
      font-size: 1.1rem;
    }

    .header-link {
      display: inline-block;
      margin-top: 10px;
      color: #7c4a3a;
      text-decoration: none;
      font-size: 0.9rem;
      padding: 6px 12px;
      border: 1px solid #7c4a3a;
      border-radius: 6px;
      transition: all 0.3s;
    }

    .header-link:hover {
      background: #7c4a3a;
      color: white;
    }

    /* Search Section */
    .search-section {
      background: rgba(255, 255, 255, 0.98);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .strategy-selector {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      padding: 12px;
      background: #f8f9fa;
      border-radius: 10px;
    }

    .strategy-option {
      flex: 1;
      padding: 12px 16px;
      background: white;
      border: 2px solid #e1e8ed;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
    }

    .strategy-option:hover {
      border-color: #7c4a3a;
    }

    .strategy-option.active {
      background: linear-gradient(135deg, #7c4a3a 0%, #a0604c 100%);
      color: white;
      border-color: #7c4a3a;
    }

    .strategy-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .strategy-description {
      font-size: 12px;
      opacity: 0.8;
    }

    .model-selector-container {
      margin-bottom: 16px;
    }

    .model-selector-label {
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
      display: block;
    }

    .model-selector {
      width: 100%;
      padding: 10px 14px;
      font-size: 14px;
      border: 2px solid #e1e8ed;
      border-radius: 8px;
      background: white;
      color: #333;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
    }

    .model-selector:hover {
      border-color: #7c4a3a;
    }

    .model-selector:focus {
      outline: none;
      border-color: #7c4a3a;
      box-shadow: 0 0 0 3px rgba(124, 74, 58, 0.1);
    }

    .search-wrapper {
      display: flex;
      gap: 12px;
    }

    .search-input {
      flex: 1;
      padding: 14px 20px;
      font-size: 16px;
      border: 2px solid #e1e8ed;
      border-radius: 10px;
      outline: none;
      transition: all 0.3s;
    }

    .search-input:focus {
      border-color: #7c4a3a;
      box-shadow: 0 0 0 3px rgba(124, 74, 58, 0.1);
    }

    .search-button {
      padding: 14px 32px;
      background: linear-gradient(135deg, #7c4a3a 0%, #a0604c 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      min-width: 120px;
    }

    .search-button:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(124, 74, 58, 0.3);
    }

    .search-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Results Section */
    .results-section {
      background: rgba(255, 255, 255, 0.98);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      flex: 1;
      overflow-y: auto;
      min-height: 400px;
    }

    /* Loading State */
    .loading {
      text-align: center;
      padding: 60px 20px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #7c4a3a;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      color: #666;
      font-size: 1.1rem;
    }

    /* Results */
    .result-item {
      background: white;
      border: 1px solid #e1e8ed;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      transition: all 0.3s;
    }

    .result-item:hover {
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
      transform: translateY(-2px);
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .result-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: #333;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .result-title:hover {
      color: #7c4a3a;
    }

    .result-score {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      background: linear-gradient(135deg, #7c4a3a 0%, #a0604c 100%);
      color: white;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .result-description {
      color: #666;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .result-url {
      color: #999;
      font-size: 0.9rem;
      text-decoration: none;
    }

    .result-url:hover {
      color: #7c4a3a;
    }

    /* Sample Queries */
    .sample-queries {
      padding: 40px;
    }

    .sample-queries-header {
      color: #999;
      margin-bottom: 24px;
      font-size: 1rem;
    }

    .sample-query {
      padding: 12px 0;
      color: #666;
      cursor: pointer;
      transition: all 0.2s;
      border-bottom: 1px solid #f0f0f0;
    }

    .sample-query:hover {
      color: #7c4a3a;
      padding-left: 10px;
      background: linear-gradient(90deg, rgba(124, 74, 58, 0.05) 0%, transparent 100%);
    }

    /* Error State */
    .error {
      background: #fee;
      border: 1px solid #fcc;
      border-radius: 8px;
      padding: 16px;
      color: #c00;
      margin: 20px 0;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .empty-state svg {
      width: 100px;
      height: 100px;
      margin-bottom: 20px;
      opacity: 0.3;
    }

    /* Rank Badge */
    .rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      background: #f0f0f0;
      border-radius: 50%;
      font-size: 0.85rem;
      font-weight: 600;
      color: #666;
      margin-right: 8px;
    }

    .rank-badge.top-3 {
      background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Agent Finder</h1>
      <p>Find out who can help with your query</p>
      <a href="/docs.html" target="_blank" class="header-link">📚 Documentation</a>
      <a href="/evaluation_report.html" target="_blank" class="header-link">📊 View Evaluation Report</a>
    </div>

    <div class="search-section">
      <div class="strategy-selector">
        <div class="strategy-option active" data-strategy="agent">
          <div class="strategy-title">Strategy 1: Agent-Level</div>
          <div class="strategy-description">Direct agent retrieval</div>
        </div>
        <div class="strategy-option" data-strategy="query">
          <div class="strategy-title">Strategy 2: Query-Level</div>
          <div class="strategy-description">Sample query matching</div>
        </div>
      </div>
      <div class="model-selector-container">
        <label class="model-selector-label" for="modelSelect">Ranking Model:</label>
        <select id="modelSelect" class="model-selector">
          <option value="gpt-4.1">gpt-4.1 (default)</option>
          <option value="gpt-4.1-mini">gpt-4.1-mini</option>
          <option value="gpt-4.1-nano">gpt-4.1-nano</option>
          <option value="gpt-5.2">gpt-5.2</option>
          <option value="gpt-5.1">gpt-5.1</option>
          <option value="gpt-5.2-codex">gpt-5.2-codex</option>
          <option value="gpt-5-nano">gpt-5-nano</option>
          <option value="gpt-4o-mini">gpt-4o-mini</option>
          <option value="o4-mini">o4-mini</option>
        </select>
      </div>
      <div class="search-wrapper">
        <input
          type="text"
          class="search-input"
          id="searchInput"
          placeholder="Enter your question..."
          autocomplete="off"
        >
        <button class="search-button" id="searchButton">Search</button>
      </div>
    </div>

    <div class="results-section" id="results">
      <!-- Initial sample queries will be shown here -->
      <div class="sample-queries" id="sampleQueries">
        <div class="sample-queries-header">Try these M365 evaluation queries (20 queries from SKDS test set):</div>
      </div>
    </div>
  </div>

  <script>
    // M365 evaluation queries from SKDS Extended Test Set
    const SAMPLE_QUERIES = [
      "Can you provide feedback on my email draft?",
      "How can I make my report more coherent?",
      "What are some ways to improve the tone of this message?",
      "Could you help me rewrite this paragraph for clarity?",
      "I need to change the tone of this email to be more formal.",
      "Can you help me generate ideas for a new marketing campaign?",
      "What are some creative exercises for generating product ideas?",
      "How can I plan an effective ideation session for my team?",
      "Can you suggest tools for organizing ideation ideas?",
      "What techniques can I use to prioritize ideas from an ideation session?",
      "Create a detailed research update on UBS including information from work and public sources.",
      "write me a detailed report predicting the movements of the microsoft stock price in the next couple days",
      "Generate a comprehensive literature review on the latest advancements in renewable energy technologies, focusing on peer-reviewed articles published between 2023 and 2025. Format as a report with the appropriate headers and formatting that ensures clarity and structure. Include a table summarizing key advancements, technologies, authors, and publication details.",
      "prioritize my tasks based on teams messages and emails",
      "compare last 10 years microsoft medical benefit and summarize the changes and trend. Then compare the data with Meta's employee medical benefit and summarize the difference",
      "Analyze the sales data from last quarter",
      "Generate a report on customer demographics",
      "Identify the key performance indicators in this dataset",
      "What are the outliers in the data?",
      "Perform a regression analysis on the provided data"
    ];

    class WHOInterface {
      constructor() {
        this.searchInput = document.getElementById('searchInput');
        this.searchButton = document.getElementById('searchButton');
        this.resultsContainer = document.getElementById('results');
        this.isSearching = false;
        this.selectedStrategy = 'agent'; // Default strategy

        this.init();
      }

      init() {
        // Show sample queries
        this.showSampleQueries();

        // Event listeners
        this.searchButton.addEventListener('click', () => this.performSearch());
        this.searchInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            this.performSearch();
          }
        });

        // Strategy selector
        document.querySelectorAll('.strategy-option').forEach(option => {
          option.addEventListener('click', (e) => {
            // Remove active class from all options
            document.querySelectorAll('.strategy-option').forEach(opt => {
              opt.classList.remove('active');
            });
            // Add active class to clicked option
            option.classList.add('active');
            // Update selected strategy
            this.selectedStrategy = option.dataset.strategy;
          });
        });
      }

      showSampleQueries() {
        const sampleContainer = document.getElementById('sampleQueries');

        // Randomly select 25 queries from the full list of 390+
        const selected = this.shuffleArray([...SAMPLE_QUERIES]).slice(0, 25);

        selected.forEach(query => {
          const queryDiv = document.createElement('div');
          queryDiv.className = 'sample-query';
          queryDiv.textContent = query.charAt(0).toUpperCase() + query.slice(1);
          queryDiv.addEventListener('click', () => {
            this.searchInput.value = query;
            this.performSearch();
          });
          sampleContainer.appendChild(queryDiv);
        });
      }

      shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      }

      async performSearch() {
        const query = this.searchInput.value.trim();
        if (!query || this.isSearching) return;

        this.isSearching = true;
        this.searchButton.disabled = true;
        this.searchButton.textContent = 'Searching...';

        // Show loading state
        this.resultsContainer.innerHTML = `
          <div class="loading">
            <div class="spinner"></div>
            <div class="loading-text">Finding relevant sites for your query...</div>
          </div>
        `;

        try {
          const selectedModel = document.getElementById('modelSelect').value;
          const response = await fetch('/who', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              query,
              meta: {
                strategy: this.selectedStrategy,
                ranking_model: selectedModel
              }
            })
          });

          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }

          const data = await response.json();

          // Store the full protocol exchange for viewing
          this.lastProtocolExchange = {
            request: {
              query: query,
              meta: {
                strategy: this.selectedStrategy,
                ranking_model: selectedModel
              }
            },
            response: data
          };

          // Parse WHO protocol response
          let results = [];
          if (data.results && Array.isArray(data.results)) {
            results = data.results;
          } else {
            console.error('Invalid response format:', data);
          }

          this.displayResults(results, query);

        } catch (error) {
          console.error('Search error:', error);
          this.showError(error.message);
        } finally {
          this.isSearching = false;
          this.searchButton.disabled = false;
          this.searchButton.textContent = 'Search';
        }
      }

      displayResults(results, query) {
        if (!results || results.length === 0) {
          this.resultsContainer.innerHTML = `
            <div class="empty-state">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <path d="m21 21-4.35-4.35"/>
              </svg>
              <h3>No results found</h3>
              <p>No relevant sites were found for "${this.escapeHtml(query)}"</p>
            </div>
          `;
          return;
        }

        // Sort by score (highest first)
        results.sort((a, b) => (b.score || 0) - (a.score || 0));

        const strategyName = this.selectedStrategy === 'agent' ? 'Agent-Level' : 'Query-Level';
        let html = `
          <div style="margin-bottom: 20px; color: #666;">
            Found ${results.length} relevant site${results.length !== 1 ? 's' : ''} for: <strong>"${this.escapeHtml(query)}"</strong>
            <br>
            <small style="color: #999;">Using ${strategyName} retrieval strategy</small>
          </div>
        `;

        results.forEach((result, index) => {
          const rank = index + 1;
          const isTop3 = rank <= 3;

          // Map WHO protocol response fields
          const endpoint = result.endpoint || result.url || '';
          const name = result.definition?.name || result.name || 'Unknown Agent';
          const description = result.definition?.description || result.description || '';

          html += `
            <div class="result-item">
              <div class="result-header">
                <a href="${this.escapeHtml(endpoint)}" target="_blank" class="result-title">
                  <span class="rank-badge ${isTop3 ? 'top-3' : ''}">${rank}</span>
                  ${this.escapeHtml(name)}
                </a>
                <span class="result-score">${result.score || 0}</span>
              </div>
              ${description ? `
                <div class="result-description">
                  ${this.escapeHtml(description)}
                </div>
              ` : ''}
              ${result.matched_queries && result.matched_queries.length > 0 ? `
                <div style="margin: 8px 0; padding: 8px; background: #f8f9fa; border-radius: 6px;">
                  <small style="color: #666; font-weight: 600;">Matched Queries:</small>
                  ${result.matched_queries.map(mq => `
                    <div style="margin: 4px 0; padding-left: 8px; border-left: 2px solid #7c4a3a; color: #666;">
                      <small>${this.escapeHtml(mq.query)}</small>
                    </div>
                  `).join('')}
                </div>
              ` : ''}
              <a href="${this.escapeHtml(endpoint)}" target="_blank" class="result-url">
                ${this.escapeHtml(this.truncateUrl(endpoint))}
              </a>
            </div>
          `;
        });

        this.resultsContainer.innerHTML = html;
      }

      showError(message) {
        this.resultsContainer.innerHTML = `
          <div class="error">
            <strong>Error:</strong> ${this.escapeHtml(message)}
          </div>
        `;
      }

      truncateUrl(url) {
        if (!url) return '';
        if (url.length > 60) {
          return url.substring(0, 60) + '...';
        }
        return url;
      }

      escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }
    }

    // Initialize when page loads
    document.addEventListener('DOMContentLoaded', () => {
      new WHOInterface();
    });
  </script>
</body>
</html>
